<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodHub | Premium Food Delivery Marketplace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>

    <nav class="navbar">

                <li>
                    <a class="nav-item cart-badge-container" id="nav-cart" onclick="Router.navigate('cart')">

                    <h4>FoodHub</h4>

                    <ul>
                        <li><a href="#">Help & Support</a></li>

                    <ul>
                        <li><a href="#">Terms & Conditions</a></li>

                &copy; 2026 FoodHub. Developed by us with ❤️❤️
